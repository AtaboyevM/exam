<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title></title>
    <!-- custom css link -->
    <link rel="stylesheet" href="style.css" />

    <!-- cndjs link -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <!-- header start -->
    <header class="header-container">
      <h1 class="header-title">Healthy Menu</h1>
      <div class="btns">
        <button class="header-onebtn">
          <i class="fa-solid fa-magnifying-glass"></i> Search Menu
        </button>

        <div class="btns-header">
          <button class="header-morebtn">
            <a href="/"> <i class="fa-solid fa-compress"></i></a>
          </button>
          <button class="header-btn">Add Menyu</button>
        </div>
      </div>
    </header>
    <!-- header end -->

    <!-- main start -->
    <!-- hero section start -->
    <section class="futured-container">
      <div class="future-titles">
        <h1>Futured Menu</h1>
        <span class="nuqta">...</span>
      </div>

      <div class="menyu-div__container">
        <div class="basic-div">
          <img src="image/Image (24).png" alt="Turkey taom" />
        </div>
        <div class="title-basic">
          <h1>Grilled Turkey Breast with Steamed Asparagus and Brown Rice</h1>
          <button class="bsic-onebtn">Launch</button>
          <div class="statistic-wraper">
            <div class="statistic-basic">
              <img src="icons/Icon (2).png" alt="ICONS" />
              <h3>Dificulty</h3>
              <p>Medium</p>
            </div>

            <div class="statistic-basic">
              <img src="icons/Icon (3).png" alt="ICONS" />
              <h3>Hearth Score</h3>
              <p>85/100</p>
            </div>
            <div class="two-basic">
              <div class="statistic-basic">
                <img src="icons/Icon (4).png" alt="ICONS" />
                <h3>Cook Duration</h3>
                <p>10 Minutes</p>
              </div>

              <div class="statistic-basic">
                <img src="icons/Icon (5).png" alt="ICONS" />
                <h3>Total Steps</h3>
                <p>4 steps</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
    <!-- hero section end -->

    <!-- main end -->
  </body>
</html>
